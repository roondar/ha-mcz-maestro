name: Validate

on:
  push:
  pull_request:

jobs:
  hassfest:
    uses: home-assistant/actions/.github/workflows/hassfest.yml@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
